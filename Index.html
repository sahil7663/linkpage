<head>
<meta charset="UTF-8" />

<title>Your Name — Links</title>

<style>
  :root {
    --paper: #F6F3EC;
    --paper-deep: #EEEAE0;
    --ink: #10213D;
    --ink-soft: #5C6B82;
    --line: #10213D1F;
    --gold: #A4824C;
    --gold-soft: #A4824C1A;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Archivo', sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 48px 18px 64px;
  }

  .frame {
    width: 100%;
    max-width: 420px;
    border: 1px solid var(--line);
    background: var(--paper);
  }

  /* ---------- letterhead header ---------- */
  .header {
    text-align: center;
    padding: 44px 28px 32px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }

  .header::before,
  .header::after {
    content: "";
    position: absolute;
    width: 7px;
    height: 7px;
    border: 1px solid var(--ink);
  }
  .header::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
  .header::after { top: 10px; right: 10px; border-left: none; border-bottom: none; }

  @media (prefers-reduced-motion: no-preference) {
    .crest, h1, .role, .tagline, .section-tag {
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }
    .crest { animation: crestIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; animation-delay: 0.05s; }
    h1 { animation-delay: 0.22s; }
    .role { animation-delay: 0.34s; }
    .tagline { animation-delay: 0.44s; }
    .section-tag { animation-delay: 0.56s; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes crestIn {
    from { opacity: 0; transform: scale(0.82); }
    to   { opacity: 1; transform: scale(1); }
  }

  .crest {
    width: 64px;
    height: 64px;
    margin: 0 auto 22px;
    border-radius: 50%;
    border: 1px solid var(--ink);
    padding: 3px;
  }
  .crest-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper-deep);
    font-weight: 600;
    font-size: 19px;
    letter-spacing: 0.02em;
    color: var(--ink);
  }
  .crest-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  h1 {
    font-weight: 600;
    font-size: 25px;
    letter-spacing: -0.01em;
    margin: 0 0 10px;
  }

  .role {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 16px;
  }

  .tagline {
    font-size: 13.5px;
    color: var(--ink-soft);
    max-width: 300px;
    margin: 0 auto;
    line-height: 1.55;
  }

  /* ---------- section tag ---------- */
  .section-tag {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .section-tag span:last-child {
    color: var(--gold);
    display: inline-block;
    width: 16px;
    height: 1px;
    background: var(--gold);
    overflow: hidden;
  }
  @media (prefers-reduced-motion: no-preference) {
    .section-tag span:last-child {
      transform: scaleX(0);
      transform-origin: right;
      animation: drawLine 0.5s ease forwards;
      animation-delay: 0.68s;
    }
  }
  @keyframes drawLine { to { transform: scaleX(1); } }

  /* ---------- links ---------- */
  .links {
    list-style: none;
    margin: 0;
    padding: 0 16px 16px;
  }

  .links li {
    border-bottom: 1px solid var(--line);
    margin: 8px 0;
  }
  .links li:first-child { margin-top: 0; }
  .links li:last-child { margin-bottom: 0; border-bottom: none; }

  @media (prefers-reduced-motion: no-preference) {
    .links li {
      opacity: 0;
      animation: rise 0.5s ease forwards;
      animation-delay: var(--rise-delay, 0ms);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  }

  .links a {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 12px;
    text-decoration: none;
    color: var(--ink);
    border-radius: 6px;
    border: 1px solid transparent;
    transform: translateY(0) scale(1);
    box-shadow: 0 0 0 0 transparent;
    transition:
      background 0.18s ease,
      border-color 0.18s ease,
      transform 0.18s cubic-bezier(0.22, 1, 0.36, 1),
      box-shadow 0.18s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .links a:hover,
  .links a:focus-visible {
    background: var(--paper-deep);
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow:
      0 6px 14px -8px rgba(16, 33, 61, 0.35),
      0 0 0 3px var(--gold-soft),
      0 0 14px 0 var(--gold-soft);
  }
  @media (prefers-reduced-motion: no-preference) {
    .links a:hover,
    .links a:focus-visible {
      animation: btnGlow 1.8s ease-in-out infinite;
    }
  }
  @keyframes btnGlow {
    0%, 100% {
      box-shadow:
        0 6px 14px -8px rgba(16, 33, 61, 0.35),
        0 0 0 3px var(--gold-soft),
        0 0 14px 0 var(--gold-soft);
    }
    50% {
      box-shadow:
        0 8px 18px -8px rgba(16, 33, 61, 0.4),
        0 0 0 4px var(--gold-soft),
        0 0 22px 2px var(--gold-soft);
    }
  }
  .links a:active {
    transform: translateY(0) scale(0.985);
    box-shadow: 0 1px 4px -2px rgba(16, 33, 61, 0.3);
    background: var(--paper-deep);
    animation: none;
    transition-duration: 0.06s;
  }
  .links a:focus-visible {
    outline: 1.5px solid var(--gold);
    outline-offset: -1.5px;
  }

  .icon {
    width: 19px;
    height: 19px;
    flex-shrink: 0;
    color: var(--ink);
    transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .links a:hover .icon,
  .links a:focus-visible .icon {
    transform: scale(1.12);
  }
  .links a:active .icon {
    transform: scale(0.95);
  }

  .label-wrap {
    flex: 1;
    text-align: left;
  }
  .label {
    display: inline-block;
    font-size: 14.5px;
    font-weight: 500;
    position: relative;
  }
  .label::after {
    content: "";
    position: absolute;
    left: 0; bottom: -3px;
    width: 0%;
    height: 1px;
    background: var(--gold);
    transition: width 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .links a:hover .label::after,
  .links a:focus-visible .label::after {
    width: 100%;
  }

  .arrow {
    width: 13px;
    height: 13px;
    color: var(--ink-soft);
    transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), color 0.18s ease;
    flex-shrink: 0;
  }
  .links a:hover .arrow,
  .links a:focus-visible .arrow {
    transform: translateX(4px);
    color: var(--gold);
  }
  .links a:active .arrow {
    transform: translateX(2px);
  }

  li.featured {
    border: 1px solid var(--gold);
    border-radius: 6px;
    margin: 0 0 10px;
  }
  @media (prefers-reduced-motion: no-preference) {
    li.featured {
      animation: rise 0.5s ease forwards, glow 3.2s ease-in-out infinite;
      animation-delay: var(--rise-delay, 0ms), 1.3s;
    }
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 0 0 var(--gold-soft); }
    50%      { box-shadow: 0 0 0 5px var(--gold-soft); }
  }
  li.featured a {
    background: var(--gold-soft);
    padding: 17px 12px;
    align-items: flex-start;
    gap: 12px;
    border-color: transparent;
  }
  li.featured .icon { color: var(--gold); margin-top: 1px; }
  li.featured .label { font-weight: 600; line-height: 1.3; }
  li.featured .badge { margin-top: 2px; transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1); }
  li.featured a:hover {
    background: var(--gold-soft);
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow:
      0 8px 16px -8px rgba(164, 130, 76, 0.45),
      0 0 0 4px var(--gold-soft),
      0 0 18px 1px var(--gold-soft);
    animation: btnGlowStrong 1.8s ease-in-out infinite;
  }
  @media (prefers-reduced-motion: no-preference) {
    @keyframes btnGlowStrong {
      0%, 100% {
        box-shadow:
          0 8px 16px -8px rgba(164, 130, 76, 0.45),
          0 0 0 4px var(--gold-soft),
          0 0 18px 1px var(--gold-soft);
      }
      50% {
        box-shadow:
          0 10px 20px -8px rgba(164, 130, 76, 0.5),
          0 0 0 5px var(--gold-soft),
          0 0 28px 3px var(--gold-soft);
      }
    }
  }
  li.featured a:hover .badge { transform: translateY(-1px); }
  li.featured a:active {
    transform: translateY(0) scale(0.985);
    box-shadow: 0 1px 4px -2px rgba(164, 130, 76, 0.4);
    animation: none;
  }

  .badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 3px 7px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  footer {
    text-align: center;
    padding: 22px 24px 26px;
    border-top: 1px solid var(--line);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
</style>
</head>

LINKS.forEach((link, i) => {
  const li = document.createElement('li');
  li.style.setProperty('--rise-delay', (LINK_START_DELAY + i * 70) + 'ms');
  if (link.featured) li.classList.add('featured');

  const a = document.createElement('a');
  a.href = link.url;
  if (!link.url.startsWith('mailto:')) {
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
  }

  const icon = ICONS[link.platform] || ICONS.default;
  const rightHTML = link.badge
    ? `<span class="badge">${link.badge}</span>`
    : `<svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>`;

  a.innerHTML = `
    <svg class="icon" viewBox="0 0 24 24">${icon}</svg>
    <span class="label-wrap"><span class="label">${link.label}</span></span>
    ${rightHTML}
  `;
  li.appendChild(a);
  list.appendChild(li);
});
